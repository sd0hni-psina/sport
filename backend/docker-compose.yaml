services:

  sport-postgres:
    image: postgres:18.3-bookworm
    container_name: sport-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ${PROJECT_ROOT}/out/pgdata:/var/lib/postgresql
    restart: always
    networks:
      - sport-net

  sport-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ${PROJECT_ROOT}/migrations:/migrations
    networks:
      - sport-net
    depends_on:
      - sport-postgres

  port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: sport-port-forwarder
    command: tcp-listen:5432,fork,reuseaddr tcp-connect:sport-postgres:5432
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - sport-net
    depends_on:
      - sport-postgres
  
  sport-redis:
    image: redis:8.6.3
    container_name: sport-redis
    restart: always
    networks:
      - sport-net
    ports:
      - "127.0.0.1:6379:6379"


networks:
  sport-net:
    driver: bridge